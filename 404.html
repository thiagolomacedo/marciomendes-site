<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <link rel="apple-touch-icon" href="/images/favicon-192.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#004d4d">
  <title>Page Not Found | Márcio Mendes</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: linear-gradient(180deg, #004d4d 0%, #000 100%);
      padding: 40px 20px;
    }
    .error-content h1 {
      font-size: 120px;
      font-weight: 700;
      color: rgba(0, 179, 179, 0.3);
      margin-bottom: 0;
      line-height: 1;
    }
    .error-content h2 {
      font-size: 32px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 20px;
    }
    .error-content p {
      font-size: 18px;
      color: rgba(255,255,255,0.7);
      margin-bottom: 30px;
      max-width: 500px;
    }
    .error-content a {
      display: inline-block;
      padding: 14px 40px;
      background: linear-gradient(135deg, #006666, #004d4d);
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      border: 1px solid rgba(0,179,179,0.3);
    }
    .error-content a:hover {
      background: linear-gradient(135deg, #008080, #006666);
      box-shadow: 0 5px 20px rgba(0,179,179,0.3);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-content">
      <h1>404</h1>
      <h2>Page Not Found</h2>
      <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
      <a href="/">Back to Home</a>
    </div>
  </div>
</body>
</html>
